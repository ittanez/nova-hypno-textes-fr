 <!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="3VKz5JfNFaPVPQOGFV9iuTBzPZsQghbXpgb8vwiyjfM" />
    <!-- Bing Webmaster Tools - vérification propriétaire -->
    <meta name="msvalidate.01" content="802C8CF0910ACE394934676CB839E931" />

    <!-- Fallback SEO tags pour crawlers sans JavaScript - Remplacés par React Helmet après chargement -->
    <!-- NB: Ces valeurs sont génériques pour éviter les titres/descriptions dupliqués avec la page d'accueil -->
    <!-- Chaque page définit ses propres meta via React Helmet, et les bots reçoivent du HTML pré-rendu via edge functions -->
    <title data-react-helmet="true">NovaHypnose - Hypnothérapie à Paris 4ème & en visio partout en France | Alain Zenatti</title>
    <meta name="description" content="NovaHypnose : hypnothérapie à Paris 4ème (Marais-Bastille) et en visioconférence partout en France. Alain Zenatti, Maître Praticien en Hypnose Ericksonienne. Stress, anxiété, phobies, sommeil." data-react-helmet="true" />
    <link rel="canonical" href="https://novahypnose.fr" data-react-helmet="true" />

    <!-- Autorise les snippets longs et images de prévisualisation pour les AI Overviews / SGE -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Balises géographiques (SEO local) - Cabinet 16 rue Saint-Antoine, Paris 4ème -->
    <meta name="geo.region" content="FR-75" />
    <meta name="geo.placename" content="Paris" />
    <meta name="geo.position" content="48.8566;2.3685" />
    <meta name="ICBM" content="48.8566, 2.3685" />

    <!-- Préconnexion CORS à Supabase pour les appels API (client supabase-js).
         maps.googleapis / img.youtube retirés : non utilisés au chargement initial,
         la connexion s'établit à la demande quand CommuteMap / LazyYouTube se montent. -->
    <link rel="preconnect" href="https://akrlyzmfszumibwgocae.supabase.co" crossorigin>

    <!-- Polices auto-hébergées via @fontsource (chargées dans index.css) -->

    <!-- Préchargement des polices critiques du hero (LCP = nom en Cormorant 500).
         Injecté au build par vite-plugin-seo-headers avec le bon hash de fichier. -->
    <!-- PRELOAD_CRITICAL_FONTS -->

    <!-- Open Graph, Twitter et Canonical gérés par react-helmet -->
    <link rel="icon" type="image/png" href="/favicon.ico" />

    <!-- Fonts chargées avec display=swap - Détection réelle du chargement -->
    <script>
      // Détecter le chargement réel des fonts pour éviter FOUT
      if ('fonts' in document) {
        Promise.all([
          document.fonts.load("700 1em 'Playfair Display'"),
          document.fonts.load("400 1em 'Poppins'"),
          document.fonts.load("600 1em 'Poppins'")
        ]).then(function() {
          document.documentElement.classList.add('fonts-loaded');
        }).catch(function() {
          // Fallback: ajouter la classe après 3s si le chargement échoue
          setTimeout(function() {
            document.documentElement.classList.add('fonts-loaded');
          }, 3000);
        });
      } else {
        // Fallback pour navigateurs anciens
        document.documentElement.classList.add('fonts-loaded');
      }
    </script>
    
    <!-- Google Analytics optimisé (différé 8s) -->
    <script>
      setTimeout(function(){
        var s=document.createElement('script');
        s.src='https://www.googletagmanager.com/gtag/js?id=G-5W9ZQEJKLF';
        s.async=true;
        document.head.appendChild(s);
        s.onload=function(){
          window.dataLayer=window.dataLayer||[];
          function gtag(){dataLayer.push(arguments);}
          gtag('js',new Date());gtag('config','G-5W9ZQEJKLF');
        };
      },8000);
    </script>
    
    <!-- Structured Data généré dynamiquement par React -->

    
    <!-- CSS critique inline - Optimisé pour LCP et FCP -->
    <style>
      /* Reset et bases essentielles */
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:16px;line-height:1.6;background-color:#F0ECE3;overflow-x:hidden;max-width:100%}
      #root{min-height:100vh;background-color:#F0ECE3}

      /* Placeholder neutre (fond lin de la charte) affiché avant le montage de React,
         pour éviter le flash de l'ancien design pendant le chargement du JS */
      .app-prerender{min-height:100vh;background-color:#F0ECE3}

      /* Carrousel - styles critiques */
      .relative{position:relative}
      .absolute{position:absolute}
      .inset-0{inset:0}
      .flex{display:flex}
      .items-center{align-items:center}
      .justify-center{justify-content:center}
      .min-h-screen{min-height:100vh}
      .z-10{z-index:10}
      .z-20{z-index:20}
      .opacity-0{opacity:0}
      .opacity-100{opacity:100}
      .transition-opacity{transition-property:opacity;transition-timing-function:cubic-bezier(.4,0,.2,1);transition-duration:.3s}

      /* Typographie critique */
      h1,h2,h3,h4,h5,h6{font-family:Georgia,'Times New Roman',Times,serif;font-weight:700;line-height:1.2;letter-spacing:0.025em}
      h1{font-size:2.25rem;margin-bottom:2rem}
      .text-4xl{font-size:2.25rem;line-height:2.5rem}
      .text-xl{font-size:1.25rem;line-height:1.75rem}
      .text-white{color:#fff}
      .font-serif{font-family:Georgia,'Times New Roman',Times,serif}
      .font-bold{font-weight:700}
      .mb-8{margin-bottom:2rem}
      .mb-4{margin-bottom:1rem}

      /* Utilitaires critiques */
      .w-full{width:100%}
      .h-full{height:100%}
      .w-12{width:3rem}
      .h-12{height:3rem}
      .text-center{text-align:center}
      .container{max-width:1200px;margin:0 auto;padding:0 1rem}
      .pointer-events-none{pointer-events:none}
      .object-cover{object-fit:cover}
      .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
      .z-30{z-index:30}
      .bg-black{background-color:#000}
      .border-white{border-color:#fff}

      /* Loading spinner */
      .loading-spinner{display:flex;align-items:center;justify-content:center;min-height:100vh}
      .animate-spin{animation:spin 1s linear infinite}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      .rounded-full{border-radius:9999px}
      .h-32{height:8rem}
      .w-32{width:8rem}
      .border-b-2{border-bottom-width:2px}
      .border-nova-blue{border-color:#233C67}

      /* Responsive - critique */
      @media (min-width:768px){
        h1,.text-4xl{font-size:3.75rem;line-height:1}
        .md\:text-6xl{font-size:3.75rem;line-height:1}
        .md\:text-xl{font-size:1.25rem;line-height:1.75rem}
      }

      /* Google Fonts - Transition douce */
      .fonts-loaded body{font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;letter-spacing:0}
      .fonts-loaded h1,.fonts-loaded h2,.fonts-loaded h3,.fonts-loaded h4,.fonts-loaded h5,.fonts-loaded h6{font-family:'Playfair Display',Georgia,'Times New Roman',serif;letter-spacing:-0.025em}

      /* ANTI-FOUC CRITIQUE : Masquer les dropdowns desktop sur mobile AVANT React */
      @media (max-width: 767px) {
        .desktop-dropdown-wrapper {
          display: none !important;
          visibility: hidden !important;
          opacity: 0 !important;
          pointer-events: none !important;
        }
      }
    </style>
    
    <!-- CSS will be injected by Vite automatically -->
    
  </head>

  <body>
    <div id="root">
      <!-- Placeholder neutre couleur lin, cohérent avec la charte, affiché avant
           le montage de React pour éviter tout flash de l'ancien design.
           Contient un H1 de repli (masqué visuellement) pour les rares crawlers
           sans JS non couverts par l'edge function de pré-rendu SEO. React le
           remplace au montage. -->
      <div class="app-prerender">
        <h1 class="sr-only">Hypnothérapeute à Paris 4ème &amp; en visio partout en France – Alain Zenatti</h1>
      </div>
    </div>
    <script type="module" src="/src/main.tsx" defer></script>
  </body>
</html>
